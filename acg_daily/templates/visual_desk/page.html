<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<style>
  :root {
    --ink: #27565b;
    --teal: #39c5bb;
    --teal-deep: #158e89;
    --aqua: #82e4db;
    --mint: #d9f8f4;
    --paper: #fbfffe;
    --pink: #ff9fbd;
    --line: #a5e5df;
    --muted: #688388;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #e6f8f6;
    color: var(--ink);
    font-family: "Noto Sans CJK SC", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif;
  }
  .report {
    position: relative;
    width: 100%;
    min-height: 100%;
    margin: 0;
    padding: 28px;
    overflow: hidden;
    background:
      linear-gradient(90deg, rgba(57,197,187,.055) 1px, transparent 1px) 0 0 / 26px 26px,
      linear-gradient(rgba(57,197,187,.055) 1px, transparent 1px) 0 0 / 26px 26px,
      var(--paper);
  }
  .report::before {
    position: absolute;
    top: 295px;
    right: -115px;
    width: 255px;
    height: 255px;
    border: 30px solid rgba(57,197,187,.12);
    border-radius: 50%;
    content: "";
  }
  .signal-bar {
    display: flex;
    position: relative;
    z-index: 1;
    height: 10px;
    margin-bottom: 13px;
    overflow: hidden;
    border: 1px solid var(--teal-deep);
    border-radius: 4px;
  }
  .signal-bar span { flex: 1; border-right: 1px solid var(--teal-deep); }
  .signal-bar span:last-child { border-right: 0; }
  .signal-bar span:nth-child(1) { background: var(--teal); }
  .signal-bar span:nth-child(2) { background: var(--pink); }
  .signal-bar span:nth-child(3) { background: var(--aqua); }
  .signal-bar span:nth-child(4) { background: var(--teal-deep); }
  .masthead {
    position: relative;
    z-index: 1;
    min-height: 158px;
    padding: 22px 28px;
    overflow: hidden;
    border: 1px solid var(--teal-deep);
    border-radius: 9px;
    background: linear-gradient(135deg, var(--teal-deep), var(--teal));
    box-shadow: 6px 6px 0 rgba(21,142,137,.16);
    color: #fff;
  }
  .masthead::before {
    position: absolute;
    top: -92px;
    right: 72px;
    width: 205px;
    height: 205px;
    border: 24px solid rgba(255,255,255,.24);
    border-radius: 50%;
    content: "";
  }
  .masthead::after {
    position: absolute;
    top: -36px;
    right: -24px;
    width: 126px;
    height: 126px;
    background: rgba(255,159,189,.88);
    transform: rotate(28deg);
    content: "";
  }
  .masthead-meta, .masthead h1, .masthead p, .edition-box { position: relative; z-index: 1; }
  .masthead-meta {
    display: flex;
    justify-content: space-between;
    max-width: 760px;
    color: #dcfffb;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 1.4px;
  }
  .masthead h1 {
    margin: 15px 0 5px;
    font-size: 40px;
    font-weight: 900;
    letter-spacing: 1px;
    line-height: 1;
  }
  .masthead p {
    max-width: 720px;
    margin: 10px 0 0;
    color: #effffd;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.58;
  }
  .edition-box {
    position: absolute;
    right: 22px;
    bottom: 20px;
    padding: 7px 10px;
    border: 1px solid rgba(255,255,255,.85);
    border-radius: 4px;
    background: #f5fffe;
    color: var(--teal-deep);
    font-size: 11px;
    font-weight: 900;
  }
  .brief {
    position: relative;
    z-index: 1;
    margin: 20px 0 16px;
    padding: 13px 18px 14px 21px;
    border: 1px solid var(--line);
    border-left: 5px solid var(--pink);
    border-radius: 6px;
    background: #fff;
    box-shadow: 4px 4px 0 rgba(21,142,137,.09);
    font-size: 15px;
    font-weight: 700;
    line-height: 1.62;
  }
  .brief-label {
    display: inline-block;
    margin-right: 8px;
    padding: 3px 6px;
    border-radius: 3px;
    background: var(--teal);
    color: #fff;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: .5px;
    vertical-align: 2px;
  }
  .headline-stack { position: relative; z-index: 1; }
  .story-card {
    display: grid;
    grid-template-columns: minmax(270px, 35%) minmax(0, 65%);
    align-items: stretch;
    overflow: hidden;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
    box-shadow: 5px 5px 0 rgba(21,142,137,.1);
  }
  .story-card.feature { margin-bottom: 14px; }
  .story-card.standard { margin-top: 12px; }
  .story-cover {
    position: relative;
    display: flex;
    min-height: 0;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border-right: 1px solid var(--line);
    background: #edfafa;
  }
  .cover-image {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #edfafa;
  }
  .story-body { min-width: 0; padding: 17px 21px 18px; background: #fff; }
  .story-card.accent-2 .story-body { background: #f4fffd; }
  .story-card.accent-3 .story-body { background: #fff9fb; }
  .story-card.accent-4 .story-body { background: #f3fcff; }
  .story-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--teal-deep);
    font-size: 11px;
    font-weight: 900;
    letter-spacing: .3px;
  }
  .story-number {
    display: inline-flex;
    min-width: 33px;
    height: 24px;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--teal-deep);
    border-radius: 4px;
    background: var(--mint);
  }
  .story-category { padding-left: 8px; border-left: 1px solid var(--line); }
  .story-source { min-width: 0; margin-left: auto; overflow: hidden; color: var(--muted); text-overflow: ellipsis; white-space: nowrap; }
  .story-title {
    margin: 11px 0 0;
    color: var(--ink);
    font-size: 23px;
    font-weight: 900;
    letter-spacing: -.35px;
    line-height: 1.38;
  }
  .story-summary { margin: 10px 0 0; color: #4d6b70; font-size: 14px; line-height: 1.7; }
  .story-note {
    display: block;
    margin-top: 12px;
    padding: 8px 10px;
    border-left: 3px solid var(--pink);
    border-radius: 3px;
    background: #eefcf9;
    color: #527176;
    font-size: 12px;
    font-weight: 700;
    line-height: 1.46;
  }
  .story-note span { margin-right: 7px; color: var(--teal-deep); font-weight: 900; }
  .cover-placeholder {
    position: relative;
    display: flex;
    width: 100%;
    height: 100%;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: repeating-linear-gradient(45deg, rgba(57,197,187,.14) 0 8px, transparent 8px 24px), var(--mint);
    color: var(--teal-deep);
  }
  .cover-placeholder-featured { background-color: var(--aqua); }
  .story-card.without-cover .story-cover { min-height: 0; }
  .story-card.feature.without-cover .story-cover { min-height: 0; }
  .cover-placeholder strong {
    position: relative;
    z-index: 2;
    max-width: 82%;
    padding: 10px 17px;
    border: 2px solid var(--teal-deep);
    border-radius: 5px;
    background: #f4fffe;
    box-shadow: 5px 5px 0 rgba(21,142,137,.16);
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 2px;
    text-align: center;
  }
  .cover-kicker, .cover-code { position: absolute; z-index: 2; font-size: 9px; font-weight: 900; letter-spacing: .7px; }
  .cover-kicker { top: 11px; left: 13px; }
  .cover-code { right: 12px; bottom: 10px; }
  .cover-orbit { position: absolute; border: 4px solid var(--pink); border-radius: 50%; }
  .orbit-one { width: 130px; height: 130px; right: -52px; top: -55px; }
  .orbit-two { width: 88px; height: 88px; left: -42px; bottom: -40px; border-color: var(--aqua); }
  .empty-state { padding: 85px 30px; border: 1px solid var(--line); border-radius: 8px; background: #fff; text-align: center; }
  .empty-state span { color: var(--teal); font-weight: 900; letter-spacing: 2px; }
  .empty-state h2 { margin: 16px 0; font-size: 25px; }
  .empty-state p { color: var(--muted); font-size: 15px; }
  .ranking-block { position: relative; z-index: 1; margin-top: 18px; overflow: hidden; border: 1px solid var(--line); border-radius: 8px; background: #fff; box-shadow: 5px 5px 0 rgba(21,142,137,.1); }
  .ranking-header { min-height: 84px; padding: 15px 21px; color: #fff; background: linear-gradient(135deg, var(--teal-deep), var(--teal)); }
  .ranking-header span { color: #dbfffb; font-size: 10px; font-weight: 900; letter-spacing: 1.4px; }
  .ranking-header h2 { display: block; margin: 6px 0 3px; font-size: 25px; }
  .ranking-header p { display: block; margin: 0; color: #edfffd; font-size: 12px; font-weight: 700; }
  .ranking-block ol { display: block; margin: 0; padding: 0; list-style: none; }
  .ranking-block li { display: flex; min-width: 0; min-height: 58px; align-items: center; gap: 12px; padding: 9px 15px; border-bottom: 1px solid var(--line); }
  .ranking-block li:last-child { border-bottom: 0; }
  .ranking-block b { display: inline-flex; width: 34px; height: 34px; flex: 0 0 34px; align-items: center; justify-content: center; border: 1px solid var(--teal-deep); border-radius: 4px; background: var(--mint); color: var(--teal-deep); font-size: 13px; }
  .ranking-block li:nth-child(1) b { background: var(--teal-deep); color: #fff; }
  .ranking-block li:nth-child(2) b { background: var(--teal); color: #fff; }
  .ranking-block li:nth-child(3) b { background: var(--aqua); }
  .ranking-block strong { min-width: 0; flex: 1; color: var(--ink); font-size: 14px; line-height: 1.35; }
  .ranking-block li span { max-width: 28%; overflow: hidden; color: var(--muted); font-size: 11px; font-weight: 700; text-overflow: ellipsis; white-space: nowrap; }
  .footer {
    display: flex;
    justify-content: space-between;
    position: relative;
    z-index: 1;
    margin-top: 24px;
    padding: 15px 2px 0;
    border-top: 1px solid var(--line);
    color: var(--muted);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .3px;
  }
  .footer strong { color: var(--teal-deep); letter-spacing: 1px; }
  @media (max-width: 520px) {
    .report { padding: 14px; }
    .masthead h1 { font-size: 36px; }
    .masthead p { max-width: 72%; }
    .story-card { grid-template-columns: 1fr; }
    .story-cover { min-height: 210px; border-right: 0; border-bottom: 1px solid var(--line); }
  }
</style>
</head>
<body>
  <main class="report">
    <div class="signal-bar"><span></span><span></span><span></span><span></span></div>
    <header class="masthead">
      <div class="masthead-meta"><span>ACG VISUAL DESK / ISSUE 01</span><span>{{DATE}}</span></div>
      <h1>次元放送局</h1>
      <p>{{SOURCE_STATUS}}</p>
      <div class="edition-box">DAILY ONE SHOT</div>
    </header>
    <section class="brief"><span class="brief-label">EDITOR NOTE</span>{{INTRO}}</section>
    <section class="headline-stack">
      {{FEATURE}}
      {{STORIES}}
    </section>
    {{RANKING}}
    <footer class="footer"><strong>ACG DAILY // VISUAL BULLETIN</strong><span>仅展示资讯来源，不展示原文链接</span></footer>
  </main>
</body>
</html>
