<article class="story-card {{CARD_KIND}} accent-{{ACCENT}}">
  <div class="story-cover">{{MEDIA}}</div>
  <div class="story-body">
    <div class="story-meta">
      <span class="story-number">{{INDEX}}</span>
      <span class="story-category">{{CATEGORY}}</span>
      <span class="story-source">{{SOURCE}}</span>
      <span class="story-published">{{PUBLISHED}}</span>
    </div>
    <h2 class="story-title">{{TITLE}}</h2>
    <p class="story-summary">{{SUMMARY}}</p>
    {{REASON}}
  </div>
</article>
